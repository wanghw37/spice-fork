input_files:
  chrom_lengths: 'objects/chrom_lengths.tsv'
  knn_train: 'objects/train_events_sv_and_unamb.pickle'
  reference_loci: 'objects/reference_loci_position.tsv'

directories:
  data_dir: 'data'
  results_dir: 'results'
  log_dir: 'logs'
  plot_dir: 'plots'

params:
  # Logging
  logging_level: "INFO"
  # Input data
  total_cn: False # Set to True for total copy-number mode (not yet fully supported)
  # Preprocessing
  wgd_inference_method: 'major_cn' # can be 'major_cn' or 'ploidy_loh'
  # Top-level parameters
  skip_existing: False # Test whether output files already exist and skip computation if so
  # Thresholds for number of events
  dist_limit: 40 # Maximum number of events to consider
  full_path_dist_limit: 9 # Above this number of events, do not attempt full path finding
  full_path_high_mem_dist_limit: 8 # Needed for cluster execution using Snakemake
  # Function parameters
  use_cache: True
  sv_size_filter: 1000
  sv_matching_threshold: 10
  sv_filter_dup_del: True
  knn_train_dataset: 'sv_unamb' # can be sv, unamb, sv_unamb or unamb_sv. Is overruled by knn_train path above
  knn_k: 250
  all_loh_solutions: False
  timing_solution_threshold: 0.316 # 1/10**(1/2)
  mcmc_max_T: -6
  mcmc_min_T: 1
  mcmc_n_iterations_scale: 200
  # Time limits (in seconds, per chromosome)
  time_limit_all_solutions: 300
  time_limit_loh_filters: None
  time_limit_mcmc: 300
  # Cluster parameters for Snakemake
  knn_mem: 16000
  full_path_mem: 16000
  full_path_mem_large: 64000
  full_path_disk: 16000 # needed for caching of paths

loci_detection:
  # De-novo loci detection parameters
  loci_steps: 'fast' # Steps to run: 'default', 'fast', combine, single step, or space-separated steps
  N_loci: 25 # Number of loci to detect
  skip_up_down: False # Skip up/down assignment
  use_original_rank: False # Use original rank from detection instead of re-ranking
  N_bootstrap: 10 # Number of bootstrap samples for signal bootstrap
  N_kernel: 1000 # Number of kernel samples for convolution kernel and height multiplier
  overwrite_preprocessing: False # Force recalculation of preprocessing caches (bootstrap signals, data_per_length_scale)
  detection_blocked_distance_th: 5000000 # Blocked distance threshold (in bp)
  # N_iterations parameters for pipeline steps
  detection_N_iterations_base: 300 # Base number of iterations for detection
  detection_max_N_iterations: 2000 # Maximum iterations for detection
  detection_final_N_iterations: 2500 # Final iterations for detection
  ranking_N_iterations: 50 # Number of iterations for ranking loci
  flipping_N_iterations: 1100 # Number of iterations for flipping
  flipping_N_iterations_single: 100 # Number of iterations for single flips
  limiting_N_iterations_optim: 1000 # Number of iterations for limiting optimization
  optimizing_N_iterations_optimization: 1100 # Number of iterations for optimization
  infer_widths_N_iterations: 100 # Number of optimization iterations for widths
  merge_N_iterations_optim: 1000 # Number of iterations for merge optimization
  within_ci_N_iterations: 1000 # Number of iterations for within ci filtering
  filter_N_iterations_optim: 1000 # Number of iterations for filter optimization
  final_limiting_N_iterations_optim: 1000 # Number of iterations for final limiting optimization
  N_bootstrap_for_widths: 10 # How many bootstrap iterations are used for inferring locus widths (needs to be <= N_bootstrap)
  th_locus_prominence: 1 # Threshold for locus prominence filtering
  # Loci assignment
  loci_assignment_N_iterations: 2500 # Number of iterations for loci assignment optimization
  loci_assignment_within_ci_N_iterations: 1000 # Number of iterations for within ci filtering
  # Loci combination and scoring parameters
  p_values_N_random: 100 # Number of random samples for p-value calculation
  p_values_iterations: 100 # Number of optimization iterations for p-value calculations
  post_p_value_N_iterations: 2500 # Number of optimization iterations after p-value filtering
  calculate_p_value: True # Whether to calculate p-values from scratch (if False, load from cache)
  p_value_threshold: 0.05 # Threshold for significant p-values
  # Event preprocessing parameters
  remove_plateaus: True # Remove events overlapping copy-number plateaus
  remove_chrY: True # Remove chrY events from analysis
  drop_duplicates: True # Remove duplicate event entries
  use_observed_centromeres: True # Use empirically observed centromere positions
