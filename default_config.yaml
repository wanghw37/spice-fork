input_files:
  chrom_lengths: 'objects/chrom_lengths.tsv'
  knn_train: 'objects/train_events_sv_and_unamb.pickle'

directories:
  data_dir: 'data'
  results_dir: 'results'
  log_dir: 'logs'
  plot_dir: 'plots'

params:
  # Logging
  logging_level: "INFO"
  # Preprocessing
  wgd_inference_method: 'major_cn' # can be 'major_cn' or 'ploidy_loh'
  # Top-level parameters
  skip_existing: True # Test whether output files already exist and skip computation if so
  # Thresholds for number of events
  dist_limit: 40 # Maximum number of events to consider
  full_path_dist_limit: 9 # Above this number of events, do not attempt full path finding
  full_path_high_mem_dist_limit: 8 # Needed for cluster execution using Snakemake
  # Function parameters
  use_cache: True
  sv_size_filter: 1000
  sv_matching_threshold: 10
  sv_filter_dup_del: True
  knn_train_dataset: 'sv_unamb' # can be sv, unamb, sv_unamb or unamb_sv. Is overruled by knn_train path above
  knn_k: 250
  all_loh_solutions: False
  timing_solution_threshold: 0.316 # 1/10**(1/2)
  mcmc_max_T: -6
  mcmc_min_T: 1
  mcmc_n_iterations_scale: 200
  # Time limits (in seconds, per chromosome)
  time_limit_all_solutions: 300
  time_limit_loh_filters: None
  time_limit_mcmc: 1
  # Cluster parameters for Snakemake
  knn_mem: 16000
  full_path_mem: 16000
  full_path_mem_large: 64000
  full_path_disk: 16000 # needed for caching of paths
